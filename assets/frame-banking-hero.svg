<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Mapa visual Frame Banking DeUna</title>
  <desc id="desc">Ilustracion abstracta del flujo de una transaccion digital desde canal hasta evidencia RUN.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081f4f"/>
      <stop offset="52%" stop-color="#0f3f82"/>
      <stop offset="100%" stop-color="#00a8c9"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d7b5"/>
      <stop offset="100%" stop-color="#65f1ff"/>
    </linearGradient>
    <linearGradient id="nodeMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#dff5ff" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0 0.9 0 0 0.4  0 0 1 0 0.8  0 0 0 0.5 0"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="680" fill="url(#bg)" rx="36"/>
  <circle cx="1040" cy="120" r="160" fill="#00d7b5" opacity="0.18"/>
  <circle cx="190" cy="590" r="210" fill="#0dc4ff" opacity="0.14"/>
  <ellipse cx="610" cy="330" rx="370" ry="220" fill="#ffffff" opacity="0.05"/>

  <path d="M250 330 C360 260 410 230 500 205" stroke="url(#line)" stroke-width="6" fill="none"/>
  <path d="M700 205 C790 230 860 260 950 330" stroke="url(#line)" stroke-width="6" fill="none"/>
  <path d="M250 350 C360 430 410 450 500 470" stroke="url(#line)" stroke-width="6" fill="none"/>
  <path d="M700 470 C790 450 860 430 950 350" stroke="url(#line)" stroke-width="6" fill="none"/>

  <circle cx="250" cy="340" r="22" fill="#00d7b5" filter="url(#softGlow)"/>
  <circle cx="950" cy="340" r="22" fill="#65f1ff" filter="url(#softGlow)"/>

  <rect x="500" y="200" width="200" height="280" rx="30" fill="url(#nodeMain)" stroke="#9ad5ff" stroke-width="2"/>
  <text x="600" y="255" text-anchor="middle" font-size="28" font-family="Segoe UI, Aptos, sans-serif" font-weight="800" fill="#0a2a57">FRAME</text>
  <text x="600" y="288" text-anchor="middle" font-size="28" font-family="Segoe UI, Aptos, sans-serif" font-weight="800" fill="#0a2a57">BANKING</text>

  <rect x="120" y="280" width="190" height="120" rx="20" fill="#ffffff" fill-opacity="0.92"/>
  <text x="215" y="324" text-anchor="middle" font-size="22" font-family="Segoe UI, Aptos, sans-serif" font-weight="700" fill="#09335f">Canal</text>
  <text x="215" y="352" text-anchor="middle" font-size="16" font-family="Segoe UI, Aptos, sans-serif" fill="#29557e">APP / API / Web</text>

  <rect x="890" y="280" width="190" height="120" rx="20" fill="#ffffff" fill-opacity="0.92"/>
  <text x="985" y="324" text-anchor="middle" font-size="22" font-family="Segoe UI, Aptos, sans-serif" font-weight="700" fill="#09335f">RUN</text>
  <text x="985" y="352" text-anchor="middle" font-size="16" font-family="Segoe UI, Aptos, sans-serif" fill="#29557e">Evidencia y soporte</text>

  <text x="600" y="556" text-anchor="middle" font-size="24" font-family="Segoe UI, Aptos, sans-serif" font-weight="700" fill="#e9f7ff">De una solicitud a una trazabilidad completa</text>
</svg>
